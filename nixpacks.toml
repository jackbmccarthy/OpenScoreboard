[build]
  build_command = "npm install && npm run build"

[static]
  public_dir = "dist"

[start]
  # Use serve with --single for SPA, but explicitly set SPA routes
  # The issue was -s redirects /assets/ - we need specific SPA fallback only
  cmd = "npx --yes serve dist --single -P -l $PORT"
  # -P = proxy all 404s to index.html (SPA mode)
  # -l = listen on PORT
  # --single = SPA fallback
