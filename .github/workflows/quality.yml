name: Quality Gates

on:
  pull_request:
    branches: [ "main", "v3" ]
  push:
    branches: [ "main", "v3" ]

jobs:
  typecheck-and-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Block new @ts-nocheck directives
        run: |
          chmod +x scripts/check-no-new-ts-nocheck.sh
          ./scripts/check-no-new-ts-nocheck.sh
